<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subway Surfers - Unhinged Edition</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            font-family: Arial, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }
        canvas {
            border: 4px solid #ffcc00;
            image-rendering: pixelated;
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 24px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            padding: 30px 50px;
            border: 4px solid #ff0000;
            text-align: center;
            display: none;
        }
        button {
            margin-top: 20px;
            padding: 12px 30px;
            font-size: 20px;
            background: #ffcc00;
            color: black;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="ui">Score: <span id="score">0</span></div>
    
    <canvas id="game" width="600" height="500"></canvas>

    <div id="gameOver">
        <h1>GAME OVER</h1>
        <p>Your score: <span id="finalScore">0</span></p>
        <button onclick="restart()">RESTART</button>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const gameOverScreen = document.getElementById('gameOver');
        const finalScoreEl = document.getElementById('finalScore');

        let score = 0;
        let speed = 6;
        let gameRunning = true;

        // Player
        let player = {
            x: 250,
            y: 350,
            width: 50,
            height: 60,
            lane: 1, // 0 left, 1 middle, 2 right
            jumping: false,
            jumpHeight: 0,
            rolling: false,
            rollTime: 0
        };

        const lanes = [150, 250, 350];

        // Obstacles and coins
        let obstacles = [];
        let coins = [];
        let frame = 0;

        // Controls
        let keys = {};

        window.addEventListener('keydown', e => {
            keys[e.key] = true;
            if ((e.key === ' ' || e.key === 'ArrowUp') && !player.jumping && gameRunning) {
                player.jumping = true;
                player.jumpHeight = 80;
            }
            if (e.key === 'ArrowDown' && !player.rolling && !player.jumping) {
                player.rolling = true;
                player.rollTime = 15;
            }
        });

        window.addEventListener('keyup', e => keys[e.key] = false);

        // Touch swipe support
        let touchStartX = 0;
        canvas.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
        });
        canvas.addEventListener('touchend', e => {
            if (!gameRunning) return;
            const touchEndX = e.changedTouches[0].screenX;
            if (touchEndX < touchStartX - 50) moveLeft();
            if (touchEndX > touchStartX + 50) moveRight();
        });

        function moveLeft() {
            if (player.lane > 0) player.lane--;
            player.x = lanes[player.lane];
        }

        function moveRight() {
            if (player.lane < 2) player.lane++;
            player.x = lanes[player.lane];
        }

        function spawnObstacle() {
            const lane = Math.floor(Math.random() * 3);
            obstacles.push({
                x: lanes[lane],
                y: -80,
                width: 50,
                height: 60,
                type: 'box' // could add train later
            });
        }

        function spawnCoin() {
            const lane = Math.floor(Math.random() * 3);
            coins.push({
                x: lanes[lane],
                y: -40,
                width: 30,
                height: 30
            });
        }

        function update() {
            if (!gameRunning) return;

            frame++;

            // Score & speed
            score += 1;
            scoreEl.textContent = Math.floor(score / 2);
            if (score % 300 === 0) speed += 0.5;

            // Player lane movement
            if ((keys['ArrowLeft'] || keys['a'] || keys['A']) && frame % 8 === 0) moveLeft();
            if ((keys['ArrowRight'] || keys['d'] || keys['D']) && frame % 8 === 0) moveRight();

            // Jump physics
            if (player.jumping) {
                player.jumpHeight -= 8;
                if (player.jumpHeight <= 0) {
                    player.jumping = false;
                    player.jumpHeight = 0;
                }
            }

            // Roll timer
            if (player.rolling) {
                player.rollTime--;
                if (player.rollTime <= 0) player.rolling = false;
            }

            // Spawn stuff
            if (frame % 45 === 0) spawnObstacle();
            if (frame % 25 === 0) spawnCoin();

            // Update obstacles
            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].y += speed;
                if (obstacles[i].y > 500) obstacles.splice(i, 1);
            }

            // Update coins
            for (let i = coins.length - 1; i >= 0; i--) {
                coins[i].y += speed;
                if (coins[i].y > 500) coins.splice(i, 1);
            }

            // Collision with obstacles
            const playerY = player.jumping ? player.y - player.jumpHeight : player.y;
            for (let obs of obstacles) {
                if (
                    Math.abs(player.x - obs.x) < 40 &&
                    Math.abs(playerY - obs.y) < 50 &&
                    !player.rolling
                ) {
                    gameOver();
                    return;
                }
            }

            // Collect coins
            for (let i = coins.length - 1; i >= 0; i--) {
                const c = coins[i];
                if (Math.abs(player.x - c.x) < 40 && Math.abs(playerY - c.y) < 40) {
                    score += 50;
                    coins.splice(i, 1);
                }
            }
        }

        function draw() {
            ctx.fillStyle = '#111133';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Tracks / lanes
            ctx.strokeStyle = '#666';
            ctx.lineWidth = 8;
            for (let i = 0; i < 4; i++) {
                ctx.beginPath();
                ctx.moveTo(i * 150, 0);
                ctx.lineTo(i * 150, 500);
                ctx.stroke();
            }

            // Player
            const drawY = player.jumping ? player.y - player.jumpHeight : player.y;
            ctx.fillStyle = player.rolling ? '#00ff00' : '#ff00ff';
            ctx.fillRect(player.x - 25, drawY, 50, player.rolling ? 30 : 60);

            // Simple face
            ctx.fillStyle = '#fff';
            ctx.fillRect(player.x - 10, drawY + 15, 8, 8);
            ctx.fillRect(player.x + 8, drawY + 15, 8, 8);

            // Obstacles
            ctx.fillStyle = '#ff3300';
            for (let obs of obstacles) {
                ctx.fillRect(obs.x - 25, obs.y, 50, 60);
            }

            // Coins
            ctx.fillStyle = '#ffcc00';
            for (let c of coins) {
                ctx.fillRect(c.x - 15, c.y - 15, 30, 30);
            }

            // Ground lines
            ctx.strokeStyle = '#555';
            ctx.lineWidth = 4;
            for (let i = 0; i < 20; i++) {
                const y = (frame * speed * 0.8 + i * 60) % 600 - 100;
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(600, y);
                ctx.stroke();
            }
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function gameOver() {
            gameRunning = false;
            finalScoreEl.textContent = Math.floor(score / 2);
            gameOverScreen.style.display = 'block';
        }

        function restart() {
            score = 0;
            speed = 6;
            obstacles = [];
            coins = [];
            player.lane = 1;
            player.x = lanes[1];
            player.jumping = false;
            player.rolling = false;
            gameRunning = true;
            gameOverScreen.style.display = 'none';
            scoreEl.textContent = '0';
        }

        // Start the game
        gameLoop();
    </script>
</body>
</html>
