<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subway Surfers - EASY MODE (for weaklings)</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            font-family: Arial, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }
        canvas {
            border: 6px solid #00ff00;
            box-shadow: 0 0 30px #00ff00;
        }
        #ui {
            position: absolute;
            top: 15px;
            left: 15px;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 3px 3px 6px #000;
        }
        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95);
            padding: 40px 60px;
            border: 6px solid #ffff00;
            text-align: center;
            display: none;
            border-radius: 15px;
        }
        button {
            margin-top: 25px;
            padding: 15px 40px;
            font-size: 22px;
            background: #00ff00;
            color: black;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        button:hover { background: #ffff00; }
    </style>
</head>
<body>
    <div id="ui">Score: <span id="score">0</span></div>
    
    <canvas id="game" width="600" height="500"></canvas>

    <div id="gameOver">
        <h1>YOU GOT CAUGHT 💀</h1>
        <p>Final Score: <span id="finalScore">0</span></p>
        <button onclick="restart()">TRY AGAIN (EASIER)</button>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const gameOverScreen = document.getElementById('gameOver');
        const finalScoreEl = document.getElementById('finalScore');

        let score = 0;
        let speed = 4;           // was 6 → now slower
        let gameRunning = true;
        let frame = 0;

        // Player
        let player = {
            x: 250,
            y: 350,
            width: 50,
            height: 60,
            lane: 1,
            jumping: false,
            jumpHeight: 0,
            rolling: false,
            rollTime: 0
        };

        const lanes = [150, 250, 350];

        let obstacles = [];
        let coins = [];
        let keys = {};

        window.addEventListener('keydown', e => {
            keys[e.key] = true;
            if ((e.key === ' ' || e.key === 'ArrowUp') && !player.jumping && gameRunning) {
                player.jumping = true;
                player.jumpHeight = 100;   // bigger jump
            }
            if (e.key === 'ArrowDown' && !player.rolling && !player.jumping) {
                player.rolling = true;
                player.rollTime = 25;      // roll lasts longer
            }
        });

        window.addEventListener('keyup', e => keys[e.key] = false);

        // Swipe support
        let touchStartX = 0;
        canvas.addEventListener('touchstart', e => touchStartX = e.changedTouches[0].screenX);
        canvas.addEventListener('touchend', e => {
            if (!gameRunning) return;
            const diff = e.changedTouches[0].screenX - touchStartX;
            if (diff < -50) moveLeft();
            if (diff > 50) moveRight();
        });

        function moveLeft() {
            if (player.lane > 0) {
                player.lane--;
                player.x = lanes[player.lane];
            }
        }
        function moveRight() {
            if (player.lane < 2) {
                player.lane++;
                player.x = lanes[player.lane];
            }
        }

        function spawnObstacle() {
            if (Math.random() < 0.4) {   // spawn way less often
                const lane = Math.floor(Math.random() * 3);
                obstacles.push({ x: lanes[lane], y: -80, w: 50, h: 60 });
            }
        }

        function spawnCoin() {
            if (Math.random() < 0.7) {
                const lane = Math.floor(Math.random() * 3);
                coins.push({ x: lanes[lane], y: -40, w: 30, h: 30 });
            }
        }

        function update() {
            if (!gameRunning) return;
            frame++;

            score += 1;
            scoreEl.textContent = Math.floor(score / 1.5);

            // Very slow speed ramp
            if (score % 800 === 0) speed += 0.3;

            // Movement
            if (frame % 6 === 0) {
                if (keys['ArrowLeft'] || keys['a'] || keys['A']) moveLeft();
                if (keys['ArrowRight'] || keys['d'] || keys['D']) moveRight();
            }

            // Jump
            if (player.jumping) {
                player.jumpHeight -= 7;
                if (player.jumpHeight <= 0) player.jumping = false;
            }

            // Roll
            if (player.rolling) {
                player.rollTime--;
                if (player.rollTime <= 0) player.rolling = false;
            }

            // Spawns
            if (frame % 60 === 0) spawnObstacle();
            if (frame % 18 === 0) spawnCoin();

            // Move objects
            for (let i = obstacles.length-1; i >= 0; i--) {
                obstacles[i].y += speed;
                if (obstacles[i].y > 520) obstacles.splice(i,1);
            }
            for (let i = coins.length-1; i >= 0; i--) {
                coins[i].y += speed;
                if (coins[i].y > 520) coins.splice(i,1);
            }

            // Collisions (very forgiving)
            const py = player.jumping ? player.y - player.jumpHeight : player.y;
            for (let obs of obstacles) {
                if (Math.abs(player.x - obs.x) < 45 && 
                    Math.abs(py - obs.y) < 55 && 
                    !player.rolling) {
                    gameOver();
                    return;
                }
            }

            // Coin collection
            for (let i = coins.length-1; i >= 0; i--) {
                let c = coins[i];
                if (Math.abs(player.x - c.x) < 45 && Math.abs(py - c.y) < 45) {
                    score += 80;   // bigger coin bonus
                    coins.splice(i,1);
                }
            }
        }

        function draw() {
            ctx.fillStyle = '#0a0a2a';
            ctx.fillRect(0, 0, 600, 500);

            // Lanes
            ctx.strokeStyle = '#555';
            ctx.lineWidth = 10;
            for (let i = 0; i < 4; i++) {
                ctx.beginPath();
                ctx.moveTo(i*150, 0);
                ctx.lineTo(i*150, 500);
                ctx.stroke();
            }

            // Player (big pink legend)
            const drawY = player.jumping ? player.y - player.jumpHeight : player.y;
            ctx.fillStyle = player.rolling ? '#00cc00' : '#ff00aa';
            ctx.fillRect(player.x-28, drawY, 56, player.rolling ? 35 : 65);

            ctx.fillStyle = '#fff';
            ctx.fillRect(player.x-12, drawY+18, 10, 10);
            ctx.fillRect(player.x+8, drawY+18, 10, 10);

            // Obstacles
            ctx.fillStyle = '#ff4444';
            for (let o of obstacles) {
                ctx.fillRect(o.x-28, o.y, 56, 65);
            }

            // Coins
            ctx.fillStyle = '#ffdd00';
            for (let c of coins) {
                ctx.fillRect(c.x-18, c.y-18, 36, 36);
            }
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function gameOver() {
            gameRunning = false;
            finalScoreEl.textContent = Math.floor(score / 1.5);
            gameOverScreen.style.display = 'block';
        }

        function restart() {
            score = 0;
            speed = 4;
            obstacles = [];
            coins = [];
            player.lane = 1;
            player.x = lanes[1];
            player.jumping = false;
            player.rolling = false;
            gameRunning = true;
            gameOverScreen.style.display = 'none';
            scoreEl.textContent = '0';
        }

        gameLoop();
    </script>
</body>
</html>
